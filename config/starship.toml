# languages & tools
[aws]
symbol = " "
format = '[$symbol($profile )(\($region\) )]($style)'
style = "bold yellow"

[docker_context]
symbol = " "

[golang]
symbol = " "

[java]
symbol = " "

[nodejs]
symbol = " "

[python]
symbol = " "
format = "[$symbol$version( \\($virtualenv\\))]($style) "
style = "bright-green"
detect_extensions = []
detect_files = [".python-version", "Pipfile", "__init__.py", "pyproject.toml", "requirements.txt", "setup.py", "tox.ini"]
python_binary = ["python3", "python", "python2"]

[rust]
symbol = " "
format = "[$symbol$version]($style) "

[terraform]
symbol = "󱁢 "
format = "[$symbol$workspace]($style) "

[package]
symbol = "󰏗 "

[conda]
symbol = " "

[ruby]
symbol = " "

[php]
symbol = " "

[perl]
symbol = " "

[swift]
symbol = " "

[dart]
symbol = " "

[elixir]
symbol = " "

[elm]
symbol = " "

[julia]
symbol = " "
format = "[$symbol$version]($style) "
style = "bold green"

[nim]
symbol = " "

[nix_shell]
symbol = " "

[hg_branch]
symbol = " "


