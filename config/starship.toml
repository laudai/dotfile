# git
[git_branch]
format = "[$symbol$branch]($style) "
symbol = "¯£Ñ "
style = "yellow"

[git_commit]
commit_hash_length = 8
style = "bold white"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
format = "$all_status$ahead_behind"
style = "bright-white"
ahead = "[Ôçí${count}](green) "
behind = "[Ôçú${count}](red) "
diverged = "[Ôçí${ahead_count}Ôçú${behind_count}](yellow) "
staged = "[ÔùÅ${count}](green) "
modified = "[!${count}](yellow) "
untracked = "[?${count}](blue) "
deleted = "[Ô£ÿ${count}](red) "
renamed = "[┬╗${count}](purple) "
conflicted = "[ÔÜá${count}](bold red) "
stashed = "[ÔÜæ${count}](cyan) "


