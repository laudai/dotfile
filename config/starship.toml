# \____/_/\__/

# git
[git_branch]
format = "[$symbol$branch]($style) "
symbol = "оңҘ "
style = "yellow"

[git_commit]
commit_hash_length = 8
style = "bold white"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
format = "$all_status$ahead_behind"
style = "bright-white"
ahead = "вҮЎ${count} "
behind = "вҮЈ${count} "
diverged = "вҮЎ${ahead_count} вҮЈ${behind_count} "
deleted = "вң—${count} "
conflicted = "вҡ  "
untracked = "?${count} "
stashed = "вҡ‘ "
modified = "вңҺ${count} "
staged = "вңҡ${count} "
renamed = "вһң${count} "


