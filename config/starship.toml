# general
format = "[´âé ](cyan)$all"
scan_timeout = 30
add_newline = true
command_timeout = 300

[character]
success_symbol = "[´æá](bold green)"
error_symbol = "[´æº](bold red)"
vicmd_symbol = "[´æí](bold green)"

[line_break]
disabled = true

[username]
format = "[$user]($style)[@](bold)"
style_user = "purple"
style_root = "red"
disabled = false
show_always = false

[hostname]
format = "[$hostname]($style) ÔçÆ "
ssh_only = false
trim_at = "-"
style = "green"
disabled = false

[directory]
style = "cyan"
truncation_length = 2
truncate_to_repo = false
truncation_symbol = "repo: "
read_only = " ´Çú"
read_only_style = "red"


