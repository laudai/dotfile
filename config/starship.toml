# general
format = "[ ](cyan)$all"
scan_timeout = 30
add_newline = true
command_timeout = 300

[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"
vicmd_symbol = "[](bold green)"

[line_break]
disabled = true

[username]
format = "[$user]($style)[@](bold)"
style_user = "purple"
style_root = "red"
disabled = false
show_always = false

[hostname]
format = "[$hostname]($style) ⇒ "
ssh_only = false
trim_at = "-"
style = "green"
disabled = false

[directory]
style = "cyan"
truncation_length = 2
truncate_to_repo = false
truncation_symbol = "repo: "
read_only = " "
read_only_style = "red"


#    _______ __
#   / ____(_) /_
#  / / __/ / __/
# / /_/ / / /_
# \____/_/\__/

# git
[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "yellow"

[git_commit]
commit_hash_length = 8
style = "bold white"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
format = "$all_status$ahead_behind"
style = "bright-white"
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇡${ahead_count} ⇣${behind_count} "
deleted = "✗${count} "
conflicted = "⚠ "
untracked = "?${count} "
stashed = "⚑ "
modified = "✎${count} "
staged = "✚${count} "
renamed = "➜${count} "


