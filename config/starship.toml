# languages & tools
[aws]
symbol = "´ë░ "
format = '[$symbol($profile )(\($region\) )]($style)'
style = "bold yellow"


[custom.cloud]
command = """
vendor=$(cat /sys/class/dmi/id/sys_vendor 2>/dev/null)
case "$vendor" in
  *Amazon*)  echo "AWS" ;;
  *Hetzner*) echo "HTZ" ;;
  *Google*)  echo "GCP" ;;
  *Microsoft*) echo "AZ" ;;
  *DigitalOcean*) echo "DO" ;;
  *) exit 1 ;;
esac
"""
when = "grep -qiE \"amazon|hetzner|google|microsoft|digitalocean\" /sys/class/dmi/id/sys_vendor 2>/dev/null"
symbol = "´ê│ "
format = "[$symbol$output]($style) "
style = "bold bright-blue"
disabled = false

