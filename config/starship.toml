# system
[battery]
format = "[$symbol$percentage]($style) "
full_symbol = "´ëÇ "
charging_symbol = "´âº "
discharging_symbol = "´ëé "
unknown_symbol = "´ä¿ "
empty_symbol = "´ëä "

[[battery.display]]
threshold = 15
style = "underline bold italic red"

[[battery.display]]
threshold = 50
style = "underline italic yellow"

[[battery.display]]
threshold = 80
style = "green"

[memory_usage]
format = "$symbol[${ram}( | ${swap})]($style) "
threshold = 85
style = "bold dimmed white"
symbol = "´ïø "
disabled = false

[time]
format = "´Çù [$time]($style) "
style = "bright-white"
