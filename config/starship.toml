# system
[battery]
format = "[$symbol$percentage]($style) "
full_symbol = "пүҖ "
charging_symbol = "пғ§ "
discharging_symbol = "пүӮ "
unknown_symbol = "п„Ё "
empty_symbol = "пү„ "

[[battery.display]]
threshold = 15
style = "underline bold italic red"

[[battery.display]]
threshold = 50
style = "underline italic yellow"

[[battery.display]]
threshold = 80
style = "green"

[memory_usage]
format = "$symbol[${ram}( | ${swap})]($style) "
threshold = 85
style = "bold dimmed white"
symbol = "пӢӣ "
disabled = false

[time]
format = "пҖ— [$time]($style) "
style = "bright-white"
time_format = "%T"
disabled = true

[cmd_duration]
min_time = 10_000
format = "пү“ [$duration]($style) "
style = "bold bright-white"

[status]
symbol = "пҒӘ"
format = '[$symbol $status_common_meaning$status_signal_name$status_maybe_int]($style)'
not_found_symbol = "п„Ё"
map_symbol = true
disabled = false

[sudo]
format = "[$symbol]($style)"
symbol = "пӮң "
style = "bold red"
disabled = false

[jobs]
symbol = "пҖ“ "
format = "[$symbol$number]($style) "
style = "bold blue"

[shell]
bash_indicator = "п’ү "
zsh_indicator = ""
disabled = false
format = "$indicator"
