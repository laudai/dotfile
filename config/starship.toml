# system
[battery]
format = "[$symbol$percentage]($style) "
full_symbol = " "
charging_symbol = " "
discharging_symbol = " "
unknown_symbol = " "
empty_symbol = " "

[[battery.display]]
threshold = 15
style = "underline bold italic red"

[[battery.display]]
threshold = 50
style = "underline italic yellow"

[[battery.display]]
threshold = 80
style = "green"

[memory_usage]
format = "$symbol[${ram}( | ${swap})]($style) "
threshold = 85
style = "bold dimmed white"
symbol = " "
disabled = false

[time]
format = " [$time]($style) "
style = "bright-white"
time_format = "%T"
disabled = true

[cmd_duration]
min_time = 10_000
format = " [$duration]($style) "
style = "bold bright-white"

[status]
symbol = ""
format = '[$symbol $status_common_meaning$status_signal_name$status_maybe_int]($style)'
not_found_symbol = ""
map_symbol = true
disabled = false

[sudo]
format = "[$symbol]($style)"
symbol = " "
style = "bold red"
disabled = false

[jobs]
symbol = " "
format = "[$symbol$number]($style) "
style = "bold blue"

[shell]
bash_indicator = " "
zsh_indicator = ""
disabled = false
