# general
set -g prefix ^a
unbind ^b
bind C-a send-prefix

# reduce delay between prefix and command to avoid conflicts with vim
set -s escape-time 1
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 5000
set -g repeat-time 600
set -g display-panes-time 1000
set -g display-time 1500
set -g set-titles off
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
setw -g monitor-activity on
set -g visual-activity on
set -g status-keys vi
setw -g mode-keys vi

# set default shell per platform (zsh path differs between macOS and Linux)
if-shell "uname -n | grep -q raspberry" "set -g default-shell /usr/bin/zsh"
if-shell "[[ $OSTYPE =~ [D|d]rawin* ]]" "set -g default-shell /bin/zsh"
if-shell "[[ $OSTYPE =~ [L|l]inux* ]]" "set -g default-shell /usr/bin/zsh"


