# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-urlview'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin '2kabhishek/tmux2k'

# tmux2k config
set -g @tmux2k-theme 'catppuccin'
set -g @tmux2k-show-powerline false
set -g @tmux2k-icons-only true
set -g @tmux2k-left-plugins "session git cwd"
set -g @tmux2k-right-plugins "cpu ram battery bandwidth network time"
set -g @tmux2k-window-list-alignment 'centre'
set -g @tmux2k-window-list-compact true
set -g @tmux2k-refresh-rate 5
set -g @tmux2k-cpu-gradient catppuccin-dark
set -g @tmux2k-battery-gradient !heat
set -g @tmux2k-session-colors "text pink"
set -g @tmux2k-git-colors "text light_blue"
set -g @tmux2k-session-format "#S:#I.#P"
set -g @tmux2k-time-format "%Y/%m/%d %H:%M:%S %a"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# NOTE: run -b (background) causes ~5s delay before status line appears because
# tmux2k's main.sh and system_profiler (used by ram.sh) are slow to execute.
# Change to `run` (foreground) to block until loaded — no flicker but delays terminal.
run -b '~/.tmux/plugins/tpm/tpm'
